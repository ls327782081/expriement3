# SASRecF 模型配置
# Self-Attentive Sequential Recommendation with Feature (extension of SASRec)
# 对标特性：多模态特征融合 → PMAT的多模态

# 模型参数
hidden_size: 126
inner_size: 256  # FFN 内部维度
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.35
attn_dropout_prob: 0.35
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02

# SASRecF 特定参数
selected_features: [category, avg_rating, rating_count]  # 选择的物品特征字段
pooling_mode: 'mean'  # 特征池化方式: mean, sum, max

# 损失函数
loss_type: 'CE'  # Cross Entropy